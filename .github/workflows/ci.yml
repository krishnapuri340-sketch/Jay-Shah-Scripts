name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  typecheck-and-build:
    name: Typecheck & Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck (workspace libs)
        run: pnpm run typecheck:libs

      - name: Typecheck (all artifacts)
        run: pnpm run typecheck

      - name: Run tests
        run: pnpm --filter "@workspace/api-server" run test

      - name: Build (all artifacts)
        run: pnpm run build
        env:
          NODE_ENV: production
          PORT: "3000"
          DATABASE_URL: postgresql://stub:stub@localhost/stub
          REPLIT_DB_URL: https://stub.replit.com
          VAPID_PUBLIC_KEY: stub
          VAPID_PRIVATE_KEY: stub
          BASE_PATH: /stub
